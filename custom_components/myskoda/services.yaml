set_charging_profile_time:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: myskoda
    id:
      required: true
      example: 1
      selector:
        number:
          min: 1
          mode: box
    enabled:
      required: true
      selector:
        boolean:
    start_time:
      required: true
      example: "20:00"
      selector:
        time:
    end_time:
      required: true
      example: "06:00"
      selector:
        time:
